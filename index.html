<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIX BEAT — メンバー紹介</title>
<style>
  /* ===== WASEDA COLOR SYSTEM =====
     Maroon  : #7B0C2A (えんじ / メイン)
     Maroon L: #9A1035 (ホバー)
     Maroon D: #4D0018 (ダーク)
     Gold    : #C8A04A (ゴールドアクセント)
     Gold L  : #F0DFA5 (薄ゴールド)
     White   : #FFFFFF
     Off-W   : #FAF7F4 (背景)
     Gray    : #EDE8E4 (ボーダー)
     Text    : #1E1210 / #5A4040 / #9A8A8A
  ================================= */
  :root {
    --maroon:    #7B0C2A;
    --maroon-h:  #9A1035;
    --maroon-d:  #4D0018;
    --maroon-xl: #F5EBE8;
    --gold:      #C8A04A;
    --gold-l:    #F0DFA5;
    --gold-d:    #9A7820;
    --white:     #FFFFFF;
    --bg:        #FAF7F4;
    --bg2:       #F2EBE5;
    --border:    #DDD4CC;
    --text-1:    #1E1210;
    --text-2:    #5A4040;
    --text-3:    #9A8070;
    --r-card:    14px;
    --r-tag:     5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text-1);
    line-height: 1.7;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--maroon-d);
    color: var(--white);
    padding: 4rem 2rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  /* 斜めストライプ — 水紋のイメージ */
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -60deg,
      transparent 0px,
      transparent 28px,
      rgba(200,160,74,0.06) 28px,
      rgba(200,160,74,0.06) 29px
    );
    pointer-events: none;
  }
  /* ゴールドのトップボーダー */
  header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--gold);
  }
  .header-inner { position: relative; }
  .header-team {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--white);
  }
  header h1 span {
    color: var(--gold);
  }
  .header-sub {
    margin-top: 0.75rem;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.05em;
  }
  .header-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 1.5rem;
  }
  .header-rule span { display:block; height:1px; width:48px; background:var(--gold); opacity:0.5; }
  .header-rule i { color:var(--gold); font-size:8px; opacity:0.7; }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    background: var(--maroon);
    padding: 0.6rem 1.5rem;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    justify-content: center;
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 1px solid var(--maroon-d);
  }
  .filter-btn {
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: rgba(255,255,255,0.75);
    padding: 0.28rem 0.85rem;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: 0.03em;
  }
  .filter-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200,160,74,0.1);
  }
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--maroon-d);
    font-weight: 700;
  }

  /* ===== GRID SECTION ===== */
  .grid-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }
  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 1.4rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    display: block;
    width: 14px;
    height: 2px;
    background: var(--maroon);
    border-radius: 1px;
  }
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 1.1rem;
  }

  /* ===== CARD ===== */
  .member-card {
    background: var(--white);
    border-radius: var(--r-card);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .member-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(75,0,24,0.12);
    border-color: rgba(123,12,42,0.3);
  }
  .member-card:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* カードトップのえんじライン */
  .card-stripe {
    height: 3px;
    background: var(--maroon);
  }

  .card-top {
    padding: 1.25rem 1.4rem 0.9rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }

  .avatar-wrap {
    flex-shrink: 0;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    border: 2.5px solid var(--maroon-xl);
    position: relative;
    background: var(--maroon-xl);
  }
  .avatar-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .avatar-initials {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--maroon);
    background: var(--maroon-xl);
    letter-spacing: -0.02em;
  }

  .card-info { flex: 1; min-width: 0; }

  .badges {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-bottom: 0.4rem;
  }
  .badge {
    font-size: 9.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: var(--r-tag);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .badge-rep    { background: var(--maroon); color: var(--white); }
  .badge-coach  { background: var(--maroon-d); color: var(--gold-l); }
  .badge-jr     { background: var(--maroon-xl); color: var(--maroon); border: 1px solid rgba(123,12,42,0.25); }
  .badge-record { background: var(--gold); color: var(--maroon-d); }
  .badge-masters{ background: #3D2010; color: #F0DFA5; }

  .card-name {
    font-size: 1.1rem;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--text-1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-role {
    font-size: 0.75rem;
    color: var(--maroon);
    font-weight: 600;
    margin-top: 2px;
    letter-spacing: 0.03em;
  }

  .card-body {
    padding: 0 1.4rem 1rem;
    flex: 1;
  }
  .card-event {
    font-size: 0.76rem;
    color: var(--text-3);
    margin-bottom: 0.45rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-event::before {
    content: '';
    display: inline-block;
    width: 10px; height: 2px;
    background: var(--gold);
    border-radius: 1px;
    flex-shrink: 0;
  }
  .card-bio {
    font-size: 0.83rem;
    color: var(--text-2);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 0.7rem 1.4rem;
    border-top: 1px solid var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }
  .social-links { display: flex; gap: 6px; }
  .social-link {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--white);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    color: var(--text-3);
    font-size: 0.65rem;
    font-weight: 800;
    transition: all 0.12s;
    letter-spacing: 0;
  }
  .social-link:hover {
    background: var(--maroon);
    color: var(--white);
    border-color: var(--maroon);
  }

  .profile-link {
    font-size: 0.75rem;
    color: var(--maroon);
    text-decoration: none;
    font-weight: 700;
    display: flex; align-items: center; gap: 3px;
    letter-spacing: 0.02em;
    transition: color 0.12s;
  }
  .profile-link:hover { color: var(--gold-d); }
  .profile-link::after { content: '→'; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(30,8,8,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 18px;
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    border: 1px solid var(--border);
  }
  .modal-header {
    background: var(--maroon-d);
    color: var(--white);
    padding: 2rem;
    border-radius: 18px 18px 0 0;
    display: flex;
    gap: 1.25rem;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .modal-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .modal-avatar {
    width: 76px; height: 76px;
    border-radius: 50%;
    border: 3px solid rgba(200,160,74,0.4);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--maroon-xl);
  }
  .modal-avatar img { width:100%;height:100%;object-fit:cover; }
  .modal-avatar .avatar-initials { font-size:1.4rem; }
  .modal-name { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.01em; }
  .modal-role-label { font-size: 0.82rem; color: var(--gold-l); margin-top: 3px; opacity: 0.8; }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.25); }
  .modal-body { padding: 1.75rem 2rem 2rem; }
  .modal-section { margin-bottom: 1.25rem; }
  .modal-section-label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 0.35rem;
    display: flex; align-items: center; gap: 6px;
  }
  .modal-section-label::before {
    content: '';
    display: block;
    width: 12px; height: 2px;
    background: var(--maroon);
    border-radius: 1px;
  }
  .modal-section p { font-size: 0.88rem; color: var(--text-2); line-height: 1.75; }
  .modal-badges { display:flex;flex-wrap:wrap;gap:5px;margin-top:0.25rem; }
  .modal-event {
    font-size: 0.9rem;
    color: var(--maroon);
    font-weight: 700;
  }
  .modal-social { display:flex;gap:8px;margin-top:0.4rem; }
  .modal-social a {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--maroon);
    text-decoration: none;
    border: 1px solid var(--maroon);
    border-radius: 6px;
    padding: 4px 12px;
    transition: all 0.12s;
    letter-spacing: 0.02em;
  }
  .modal-social a:hover { background: var(--maroon); color: var(--white); }

  /* ===== FOOTER ===== */
  footer {
    background: var(--maroon-d);
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 1.75rem 2rem;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    border-top: 3px solid var(--maroon);
  }
  footer strong { color: var(--gold); font-weight: 700; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .members-grid { grid-template-columns: 1fr; }
    .card-top { padding: 1.1rem 1.25rem 0.75rem; }
    .card-body { padding: 0 1.25rem 0.75rem; }
    .card-footer { padding: 0.6rem 1.25rem; }
    .modal-body { padding: 1.25rem 1.5rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-inner">
    <div class="header-team">Waseda University Finswimming Team</div>
    <h1>SIX <span>BEAT</span></h1>
    <p class="header-sub">早稲田大学フィンスイミングチーム — メンバー紹介</p>
    <div class="header-rule">
      <span></span>
      <span></span>
    </div>
  </div>
</header>

<!-- ===== FILTER BAR ===== -->
<nav class="filter-bar" aria-label="カテゴリフィルター">
  <button class="filter-btn active" onclick="filterCards('all', this)">すべて</button>
  <button class="filter-btn" onclick="filterCards('coach', this)">コーチ</button>
  <button class="filter-btn" onclick="filterCards('rep', this)">日本代表</button>
  <button class="filter-btn" onclick="filterCards('jr', this)">ジュニア</button>
  <button class="filter-btn" onclick="filterCards('masters', this)">マスターズ</button>
  <button class="filter-btn" onclick="filterCards('record', this)">記録保持者</button>
</nav>

<!-- ===== GRID ===== -->
<main class="grid-section">
  <div class="section-label">Members — <span id="count">0</span> 名</div>
  <div class="members-grid" id="membersGrid"></div>
</main>

<!-- ===== FOOTER ===== -->
<footer>
  <strong>WASEDA UNIVERSITY FINSWIMMING TEAM SIX BEAT</strong><br>
  早稲田大学フィンスイミングチーム &nbsp;｜&nbsp; 設立 2003年
</footer>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()" aria-label="閉じる">✕</button>
    <div class="modal-header">
      <div class="modal-avatar" id="modalAvatar"></div>
      <div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-role-label" id="modalRoleLabel"></div>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* =============================================
   メンバーデータ — ここを編集してください
   tags: "rep" / "jr" / "coach" / "masters" / "record"
   ============================================= */
const members = [
  {
    name: "山田 太郎",
    role: "ヘッドコーチ",
    event: "サーフィス 200m / 400m",
    bio: "20年以上のコーチ経験を持つ。日本代表チームのサポートも担当し、チームの精神的支柱として活躍。フィンスイミングの楽しさを次世代に伝えることを使命とする。",
    career: "2003〜2015年 日本代表選手\n2016年〜 ヘッドコーチ就任\n2020年〜 ジュニア日本代表監督",
    tags: ["coach", "record"],
    badges: ["coach", "record"],
    photo: null,
    instagram: "https://www.instagram.com/",
    twitter: "https://x.com/"
  },
  {
    name: "鈴木 花子",
    role: "選手",
    event: "100m / 200m サーフィス",
    bio: "スピードと持久力を兼ね備えたオールラウンダー。国際大会での経験も豊富で、チームの牽引役として後輩の指導にも力を入れている。",
    career: "2019年〜 日本代表選出\n2021年 アジア選手権 銅メダル\n2023年 世界選手権出場",
    tags: ["rep", "record"],
    badges: ["rep", "record"],
    photo: null,
    instagram: "https://www.instagram.com/"
  },
  {
    name: "佐藤 健一",
    role: "選手",
    event: "50m ビーフィン",
    bio: "爆発的なスタートダッシュが武器の短距離スペシャリスト。ユース記録保持者として後進の憧れの的。練習への姿勢も真摯で、チームの雰囲気を高める存在。",
    career: "2022年〜 ジュニア日本代表\n2023年 ユース日本記録樹立",
    tags: ["jr", "record"],
    badges: ["jr", "record"],
    photo: null,
    instagram: "https://www.instagram.com/"
  },
  {
    name: "高橋 美咲",
    role: "選手",
    event: "400m サーフィス",
    bio: "長距離を得意とする安定感抜群の選手。忍耐強いトレーニングで着実に記録を伸ばしてきた。「諦めない泳ぎ」がチームのモットーを体現している。",
    career: "2020年〜 日本代表選出\n2022年 日本選手権 優勝",
    tags: ["rep"],
    badges: ["rep"],
    photo: null,
    twitter: "https://x.com/"
  },
  {
    name: "伊藤 勇気",
    role: "選手",
    event: "50m / 100m アプニア",
    bio: "息こらえ種目のスペシャリスト。独特のメンタルコントロール力で安定したパフォーマンスを発揮する。趣味は料理で、チームの食事会の幹事も担当。",
    career: "2023年 アジアジュニア競技会 優勝\n2024年〜 学生日本代表",
    tags: ["jr"],
    badges: ["jr"],
    photo: null,
    instagram: "https://www.instagram.com/"
  },
  {
    name: "中村 理恵",
    role: "選手",
    event: "マスターズ 4×50m リレー",
    bio: "社会人になってから競技を始めたマスターズ選手。仕事と競技の両立を体現し、チームの幅広い年齢層の活躍を支える存在。元日本記録保持者。",
    career: "2018年〜 マスターズ大会参加\n2022年 マスターズ世界選手権代表候補\n4×50mリレー 元日本記録保持者",
    tags: ["masters", "record"],
    badges: ["masters", "record"],
    photo: null,
    instagram: "https://www.instagram.com/"
  },
  {
    name: "小林 翔",
    role: "選手",
    event: "100m / 200m ビーフィン",
    bio: "競泳からフィンスイミングに転向した経歴を持つ。高い技術力を武器に、短期間でめきめきと力をつけてきた将来有望な選手。目標は世界大会出場。",
    career: "高校まで競泳（関東大会出場）\n2023年〜 フィンスイミング転向",
    tags: [],
    badges: [],
    photo: null
  },
  {
    name: "田中 さくら",
    role: "選手",
    event: "50m / 100m サーフィス",
    bio: "フィンスイミングの楽しさに魅了されて入部。笑顔でチームを明るくする存在。練習では誰よりも積極的に質問し、急速に成長中。",
    career: "2024年〜 チーム加入\n初心者から1年でトップ選手へ成長中",
    tags: [],
    badges: [],
    photo: null,
    instagram: "https://www.instagram.com/"
  }
];

/* ============================================= */

const badgeConfig = {
  rep:    { label: "日本代表",     cls: "badge-rep" },
  coach:  { label: "コーチ",       cls: "badge-coach" },
  jr:     { label: "ジュニア代表", cls: "badge-jr" },
  record: { label: "記録保持者",   cls: "badge-record" },
  masters:{ label: "マスターズ",   cls: "badge-masters" }
};

function initials(name) {
  return name.trim().split(/\s+/).map(p => p[0]).join('').slice(0,2).toUpperCase();
}
function avatarHTML(m) {
  return m.photo
    ? `<img src="${m.photo}" alt="${m.name}" loading="lazy">`
    : `<div class="avatar-initials">${initials(m.name)}</div>`;
}

function renderCards(filter) {
  const grid = document.getElementById('membersGrid');
  const list = filter === 'all' ? members : members.filter(m => m.tags.includes(filter));
  document.getElementById('count').textContent = list.length;

  grid.innerHTML = list.map(m => {
    const idx = members.indexOf(m);
    const badgesHTML = m.badges.map(b => {
      const c = badgeConfig[b];
      return c ? `<span class="badge ${c.cls}">${c.label}</span>` : '';
    }).join('');
    const socials = [
      m.instagram ? `<a class="social-link" href="${m.instagram}" target="_blank" rel="noopener" title="Instagram" onclick="event.stopPropagation()">IG</a>` : '',
      m.twitter   ? `<a class="social-link" href="${m.twitter}"   target="_blank" rel="noopener" title="X" onclick="event.stopPropagation()">𝕏</a>` : ''
    ].join('');

    return `
    <article class="member-card"
      onclick="openModal(${idx})"
      tabindex="0" role="button"
      aria-label="${m.name}のプロフィールを見る"
      onkeydown="if(event.key==='Enter')openModal(${idx})">
      <div class="card-stripe"></div>
      <div class="card-top">
        <div class="avatar-wrap">${avatarHTML(m)}</div>
        <div class="card-info">
          ${badgesHTML ? `<div class="badges">${badgesHTML}</div>` : ''}
          <div class="card-name">${m.name}</div>
          <div class="card-role">${m.role}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-event">${m.event}</div>
        <p class="card-bio">${m.bio}</p>
      </div>
      <div class="card-footer">
        <div class="social-links">${socials}</div>
        <span class="profile-link">プロフィールを見る</span>
      </div>
    </article>`;
  }).join('');
}

function filterCards(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(tag);
}

function openModal(idx) {
  const m = members[idx];
  document.getElementById('modalAvatar').innerHTML = avatarHTML(m);
  document.getElementById('modalName').textContent = m.name;
  document.getElementById('modalRoleLabel').textContent = `${m.role} | ${m.event}`;

  const badgesHTML = m.badges.map(b => {
    const c = badgeConfig[b];
    return c ? `<span class="badge ${c.cls}">${c.label}</span>` : '';
  }).join('');
  const socials = [
    m.instagram ? `<a href="${m.instagram}" target="_blank" rel="noopener">Instagram</a>` : '',
    m.twitter   ? `<a href="${m.twitter}"   target="_blank" rel="noopener">X (Twitter)</a>` : ''
  ].filter(Boolean).join('');

  document.getElementById('modalBody').innerHTML = `
    ${badgesHTML ? `<div class="modal-section"><div class="modal-badges">${badgesHTML}</div></div>` : ''}
    <div class="modal-section">
      <div class="modal-section-label">種目</div>
      <div class="modal-event">${m.event}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">自己紹介</div>
      <p>${m.bio}</p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">経歴</div>
      <p>${m.career.replace(/\n/g,'<br>')}</p>
    </div>
    ${socials ? `<div class="modal-section"><div class="modal-section-label">SNS</div><div class="modal-social">${socials}</div></div>` : ''}
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderCards('all');
</script>
</body>
</html>
